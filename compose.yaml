# Stack de teste do manypost — um comando: `docker compose up`
#
# Sobe o backend (app = API + worker no mesmo processo) + Postgres + Redis, aplica as
# migrations no boot e serve o explorador de API em http://localhost:3000/docs.
#
# É uma configuração de TESTE LOCAL: segredos abaixo são fixos e públicos de propósito
# (facilitam o clone-e-testa). NÃO use estes valores em produção — gere os seus com
# `openssl rand -hex 32` (ENCRYPTION_KEY) e um segredo forte (JWT_SECRET).
#
# Passo a passo para leigos: veja TESTING.md.
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      MODE: all # api + worker no mesmo processo
      PORT: 3000
      PUBLIC_URL: http://localhost:3000
      DATABASE_URL: postgresql://manypost:manypost@postgres:5432/manypost
      REDIS_URL: redis://redis:6379
      # Segredos DISTINTOS e fixos SÓ PARA TESTE (o boot falha se forem iguais).
      JWT_SECRET: manypost-teste-local-troque-em-producao-1234567890
      ENCRYPTION_KEY: 4d616e79706f7374207465737465206c6f63616c206e6f742073656372657421 # 64 hex
      AI_PROVIDER: none
      # Publica rápido no teste (backoff base curto) — em produção o default é 30s.
      PUBLISH_RETRY_BASE_SEC: 1
      # Credenciais de rede real são OPCIONAIS. Para publicar de verdade, descomente e
      # preencha (veja TESTING.md → "Publicar numa rede real" e docs/principal/INTEGRATIONS_SETUP.md):
      # TELEGRAM_BOT_TOKEN: ""
      # MASTODON_DEFAULT_INSTANCE: "https://mastodon.social"
    ports:
      - '3000:3000'
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: manypost
      POSTGRES_PASSWORD: manypost
      POSTGRES_DB: manypost
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U manypost -d manypost
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
  uploads:
