name: Bug Report
description: Reporte um erro ou comportamento inesperado para nos ajudar a melhorar o manypost.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar um problema! Antes de prosseguir, por favor, verifique nas [Issues abertas](https://github.com/manypost/manypost/issues) se este problema já não foi reportado por outra pessoa.
  - type: textarea
    id: description
    attributes:
      label: Descrição do Bug
      description: O que está acontecendo?
      placeholder: Descreva claramente qual foi o erro encontrado...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Passos para Reproduzir
      description: Uma lista numerada de como fazer o erro acontecer.
      placeholder: |
        1. Vá para '...'
        2. Clique em '...'
        3. Role até '...'
        4. Veja o erro
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento Esperado
      description: O que deveria ter acontecido?
      placeholder: Eu esperava que...
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots ou Logs
      description: Espaço livre para anexar imagens da interface ou logs de erro do console/terminal.
      placeholder: Arraste arquivos aqui ou cole logs...
  - type: dropdown
    id: os
    attributes:
      label: Sistema Operacional
      options:
        - Windows
        - macOS
        - Linux
        - iOS
        - Android
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Navegador (se aplicável)
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Não se aplica (Problema na API/Backend)
