name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: mp
          POSTGRES_PASSWORD: mp
          POSTGRES_DB: mp
        ports:
          - 5499:5432
        options: >-
          --health-cmd "pg_isready -U mp -d mp"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6399:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: typecheck
        run: bun run typecheck
      - name: testes
        run: bun test
      - name: fronteiras de arquitetura (dependency-cruiser)
        run: bun run check:boundaries
      - name: provedores de IA nominais (SPEC_AI §2)
        run: bun run check:ai-providers
      - name: fronteira 100% Open Source — garantia de inexistência de dependência/repositório premium fechado (@manypost-premium)
        run: |
          ! grep -rn "manypost-premium\|@manypost-premium" apps packages --include="*.ts" --include="*.json" \
            || (echo "ERRO: Referência a @manypost-premium encontrada. O projeto é 100% open source (monorepo unificado), sem repositório fechado." && exit 1)
      - name: drizzle drift check (migrations sincronizadas com o schema)
        working-directory: packages/db
        run: bunx drizzle-kit check
      - name: e2e (API+worker reais + Postgres real + migrations no boot)
        env:
          MODE: all
          PORT: 3988
          PUBLIC_URL: http://localhost:3988
          # Superfícies de máquina em hosts dedicados (SPEC_API_MCP §3/§5). O mesmo processo
          # atende os três: localhost = app, 127.0.0.1 = API REST (/v1), 127.0.0.2 = MCP (raiz)
          # — o roteamento é por Host, então três nomes de loopback provam a separação sem DNS.
          API_PUBLIC_URL: http://127.0.0.1:3988
          MCP_PUBLIC_URL: http://127.0.0.2:3988
          DATABASE_URL: postgresql://mp:mp@localhost:5499/mp
          REDIS_URL: redis://localhost:6399
          JWT_SECRET: ci-secret-with-at-least-32-characters!!
          ENCRYPTION_KEY: cdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcd
          DB_MIGRATE: auto
          PUBLISH_RETRY_BASE_SEC: 1
          WEBHOOKS_ALLOW_PRIVATE: 'true'
          MEDIA_ALLOW_PRIVATE_URLS: 'true'
          UPLOAD_DIR: /tmp/mp-uploads
        run: |
          bun run apps/api/src/main.ts &
          for i in $(seq 1 30); do curl -sf http://localhost:3988/health >/dev/null && break; sleep 1; done
          BASE_URL=http://localhost:3988 API_BASE_URL=http://127.0.0.1:3988/v1 bun run scripts/e2e-auth.ts
          BASE_URL=http://localhost:3988 bun run scripts/e2e-publish.ts
          BASE_URL=http://localhost:3988 API_BASE_URL=http://127.0.0.1:3988/v1 bun run scripts/e2e-public.ts
          BASE_URL=http://localhost:3988 MCP_URL=http://127.0.0.2:3988 bun run scripts/e2e-mcp.ts

      # Limites de plano: exige a API em modo GERENCIADO (IS_SELF_HOSTED=false + Stripe).
      # Nenhuma chamada sai para a Stripe — o enforcement é local; a chave só liga o modo.
      # Banco próprio: a fase 1 enche a cota mensal da org, não pode sujar o e2e principal.
      - name: e2e billing (planos no gerenciado + Community sem cobrança)
        env:
          MODE: all
          PORT: 3987
          PUBLIC_URL: http://localhost:3987
          DATABASE_URL: postgresql://mp:mp@localhost:5499/mp_billing
          REDIS_URL: redis://localhost:6399
          JWT_SECRET: ci-secret-with-at-least-32-characters!!
          ENCRYPTION_KEY: cdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcd
          DB_MIGRATE: auto
          PUBLISH_RETRY_BASE_SEC: 1
          UPLOAD_DIR: /tmp/mp-uploads-billing
          IS_SELF_HOSTED: 'false'
          HIDE_BILLING: 'false'
          STRIPE_SECRET_KEY: sk_test_ci_nunca_chamada
          STRIPE_WEBHOOK_SECRET: whsec_ci
        run: |
          PGPASSWORD=mp psql -h localhost -p 5499 -U mp -d mp -c 'CREATE DATABASE mp_billing;'
          bun run apps/api/src/main.ts &
          for i in $(seq 1 30); do curl -sf http://localhost:3987/health >/dev/null && break; sleep 1; done
          # segunda instância em modo Community (sem Stripe) para provar o outro lado da fronteira
          MODE=api PORT=3986 PUBLIC_URL=http://localhost:3986 \
            DATABASE_URL=postgresql://mp:mp@localhost:5499/mp_billing \
            IS_SELF_HOSTED=true HIDE_BILLING=true STRIPE_SECRET_KEY= STRIPE_WEBHOOK_SECRET= \
            bun run apps/api/src/main.ts &
          for i in $(seq 1 30); do curl -sf http://localhost:3986/health >/dev/null && break; sleep 1; done
          BASE_URL=http://localhost:3987 SELF_HOSTED_BASE_URL=http://localhost:3986 \
            bun run scripts/e2e-billing.ts
